<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
	<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>


</head>
<body>

<div class="wrapper signup-step2">
    <div class="signup-form">
        <form action="/signup_final" method="post">
            <h1>Select personal interests</h1>
            
            <div class="input-field">
                <label for="industry_id">Select your industry:</label>
                <select name="industry_id" id="industry_id" required>
                    <option value="">--Please choose an option--</option>
                    {% for industry in industries %}
                    <option value="{{ industry.id }}">{{ industry.name }}</option>
                    {% endfor %}
                </select>
            </div>
            

		<div class="form-group">
    <label for="interest-search"></label>
    <input type="text" id="interest-search" placeholder="Search interests...">
    <div id="interests-list">
        <!-- Initially empty; will be populated by script -->
    </div>
</div>
            
            <button type="submit" class="btn-complete-signup">Complete Sign Up</button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('interest-search');
    let interests = [];

    // Fetch the initial list of interests
    fetch('/api/interests')
        .then(response => response.json())
        .then(data => {
            interests = data.interests;
            displayInterests(interests.slice(0, 30)); // Display first 30 interests initially
        });

    searchInput.addEventListener('input', function() {
        const searchTerm = searchInput.value.toLowerCase();
        const filteredInterests = interests.filter(interest => 
            interest.name.toLowerCase().includes(searchTerm)
        );
        displayInterests(filteredInterests);
    });

    function displayInterests(interests) {
        const container = document.getElementById('interests-list');
        container.innerHTML = ''; // Clear existing interests
        interests.forEach(interest => {
            const label = document.createElement('label');
            label.innerHTML = `
                <input type="checkbox" name="interests" value="${interest.id}"> ${interest.name}
            `;
            container.appendChild(label);
        });
    }
});
</script>



</body>
</html>
