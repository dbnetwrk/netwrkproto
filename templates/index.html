

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Login</title>
</head>
<body>
  <div class="wrapper">
    <div class="container main">
        <div class="row">
            <div class="col-md-6 side-image">
                       
                <!-------------      image     ------------->
                
                <img src="images/white.png" alt="">
                <div class="text">
                    <p>Join the community of developers <i>- ludiflex</i></p>
                </div>
                
            </div>

            <div class="col-md-6 right">
                
                <div class="input-box">
                   
                   <header>Create account</header>
                   <form action="/signup_step1" method="post" enctype="multipart/form-data">
            <div class="input-field">
                <input type="text" class="input" id="first_name" name="first_name" required="" autocomplete="off">
                <label for="first_name">First Name</label> 
            </div> 

            <div class="input-field">
                <input type="text" class="input" id="last_name" name="last_name" required="" autocomplete="off">
                <label for="last_name">Last Name</label> 
            </div>

            <div class="input-field">
                <input type="password" class="input" id="password" name="password" required="">
                <label for="password">Password</label>
            </div> 

            <div class="input-field">
                <input type="submit" class="submit" value="Sign Up">
            </div> 
        </form>
                   <div class="signin">
                    <span>Already have an account? <a href="#">Log in here</a></span>
                   </div>
                </div>  
            </div>
        </div>
    </div>
</div>
</body>
</html>
