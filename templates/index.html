<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Netwrk</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

body, html {
    object-fit: fill;
  background-color: #000d14;
  background-image: url("https://assets-global.website-files.com/655b01d3a75bf32516a29d96/655b0f1c8fbbaaf6dd0be0ad_Frame%206.png");
  background-position: 50%;
  background-size: cover;
  padding-bottom: 0;
 font-family: 'Roboto', Arial, sans-serif;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.info {
    text-align: center;
    margin-bottom: 20px;
    color: #fff;
}

.signup-form {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* White glow */
}

.signup-form h2 {
    color: #333;
}

.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
}

.input-group input {
    width: calc(100% - 22px); /* Adjust the width to account for padding and border */
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
}

button {
    width: calc(100% - 20px); /* Adjust button width to ensure it fits within the form */
    padding: 10px;
    border: none;
    background-color: #0A66C2;
    color: white;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}

@media (max-width: 600px) {
    .container {
        padding: 10px;
    }
    .input-group input, button {
        width: 100%; /* On mobile, input and button should expand to full container width */
    }
}

.logo {
    display: block;
    max-width: 100%; /* Ensure the logo is not wider than the container */
    height: 10%; /* Maintain aspect ratio */
    margin: 0 auto 20px; /* Center the logo and add some space below it */
}





</style>

</head>
<body>
    <div class="container">
        <section class="info">
            <img src="https://assets-global.website-files.com/655b01d3a75bf32516a29d96/655e275a4518537470b8fd91_Logo-1b.png" alt="GreenSprout Logo" class="logo">
            <ul style ="list-style-type: none;">
    <li>🌐 A professional platform exclusively for Gen Z</li>
    <li>💡 Discover fresh ideas</li>
    <li>🤝 Connect through shared interests</li>
    <li>🗨️ Join communities & have deep discussions</li>
</ul>


        </section>
        <section class="signup-form">
            <h2>Sign Up</h2>
            <form action="/signup_step1" method="POST">
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>
                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Sign Up</button>
            </form>
        </section>
    </div>
</body>
</html>
