<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
    <title>Netwrk</title>
</head>
<body>

<div class="main-container">

    <div class="site-description">
        <h1>Welcome to Netwrk</h1>
        <ul>
            <li>A professional networking site only for Gen Z</li>
            <li>Learn fresh ideas and perspectives</li>
            <li>Make real connections over shared interests</li>
            <li>Join communities and have deeper discussions</li>
        </ul>
    </div>
    
    <div class="signup-form">
        <form action="/signup_step1" method="post" enctype="multipart/form-data">
            <h1>Create Account</h1>
            <input type="text" placeholder="First Name" name="first_name" required>
            <input type="text" placeholder="Last Name" name="last_name" required>
            <input type="password" placeholder="Password" name="password" required>
            <button type="submit">Sign Up</button>
        </form>
    </div>
    
</div>

</body>
</html>
