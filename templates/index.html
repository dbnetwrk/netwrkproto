<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Community Prototype</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            font-family: 'Arial', sans-serif;
        }
        .content {
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        a.button, a.login-link {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            margin: 5px; /* Adds a little space between buttons if you have more than one */
        }
        a.button:hover {
            background-color: #0056b3;
        }
        a.login-link {
            background-color: transparent;
            color: #007bff;
        }
        a.login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>A Gen-Z only community where you can network, discover opportunities, and freely express your thoughts.</h1>
        <a href="/signup" class="button">Sign Up</a>
        <a href="/login" class="login-link">Login</a>
    </div>

</body>
</html>
