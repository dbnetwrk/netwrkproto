<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Form with Progress</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        textarea, input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box; /* Makes sure the padding does not affect the total width */
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .progress-container {
            width: 100%;
            background-color: #eee;
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 10%; /* Initial boost */
            height: 24px;
            background-color: #007bff;
            text-align: center;
            line-height: 24px;
            color: white;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>
    
<h1>Please use fake information for prototype sign up</h1>

<form method="post" enctype="multipart/form-data">

    <div class="form-group">
        <label for="first_name">First Name:</label>
        <input type="text" id="first_name" name="first_name" required>
    </div>

    <div class="form-group">
        <label for="last_name">Last Name:</label>
        <input type="text" id="last_name" name="last_name" required>
    </div>

    <div class="form-group">
        <label for="password">Your Password:</label>
        <input type="text" id="password" name="password" required>
    </div>


<button type="submit">Submit</button>

</form>


   

    
</form>

<script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const formElements = document.querySelectorAll('input[type="text"], textarea');
            const progressBar = document.getElementById('progressBar');
            const totalElements = formElements.length + 1; // +1 for the initial boost
            let filledElements = 1; // Starting with an initial boost

            const updateProgress = () => {
                filledElements = 1 + [...formElements].filter(el => el.value.trim() !== '').length; // +1 for the initial boost
                const progressPercentage = Math.round((filledElements / totalElements) * 100);
                progressBar.style.width = `${progressPercentage}%`;
                progressBar.textContent = `${progressPercentage}%`;
            };

            formElements.forEach(el => {
                el.addEventListener('input', updateProgress);
            });

            // Initialize the progress bar with the initial boost
            updateProgress();
        });


        document.addEventListener('DOMContentLoaded', () => {
    const checkboxes = document.querySelectorAll('input[name="tags"]');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', () => {
            let checkedBoxes = document.querySelectorAll('input[name="tags"]:checked');
            if(checkedBoxes.length > 5) {
                checkbox.checked = false;
                alert('You can select up to 5 interests only.');
            }
        });
    });
});

        
    </script>
</body>
</html>


</body>
</html>
